---
# Guacamole dependencies on Ubuntu 24-04 repos
guacamole_ubuntu_deps:
  - "{{ guacamole_tomcat }}"
  - build-essential
  - dpkg-dev
  - freerdp2-x11
  - ghostscript
  - libavcodec-dev
  - libavutil-dev
  - libcairo2-dev
  - freerdp2-dev
  - libjpeg-turbo8-dev
  - libossp-uuid-dev
  - libpango1.0-dev
  - libpng-dev
  - libpulse-dev
  - libssh2-1-dev
  - libssl-dev
  - libswscale-dev
  - libtelnet-dev
  - libvncserver-dev
  - libvorbis-dev
  - libwebp-dev

# Guacamole version to install (and corresponding download URL)
guacamole_version: 1.6.0
guacamole_dl_url: "{{ 'https://downloads.apache.org/guacamole/' + guacamole_version }}"
guacamole_server_package: "{{ 'guacamole-server-' + guacamole_version + '.tar.gz' }}"
guacamole_client_package: "{{ 'guacamole-' + guacamole_version + '.war' }}"

# Where to install Guacamole
guacamole_src_dir: /usr/local/src

# Name of the Tomcat user and Tomcat service.
# Both depend on the distro and ansible version.
# Read the docs before overriding defaults.
# Check: https://github.com/mrlesmithjr/ansible-guacamole/blob/master/tasks/set_facts.yml
# Also, note that if you change the name of the Tomcat service you need to add a corresponding handler to restart the service!
# Check handlers/main.yml.
guacamole_tomcat: tomcat10
guacamole_tomcat_user: tomcat
guacamole_tomcat_service: tomcat10

# For now, use Guacamole built-in authentication
guacamole_basic_user_mapping: /etc/guacamole/user-mapping.xml
guacamole_auth_provider: net.sourceforge.guacamole.net.basic.BasicFileAuthenticationProvider
guacamole_server_hostname: localhost

# Authorized users
guacamole_users:
  - name: user1
    password: password
    connections:
      - host: 10.0.101.50
        name: nas01
        protocol: ssh
        port: 22
      - host: 192.168.250.11
        name: windows2016
        protocol: rdp
        port: 3389
      - host: 192.168.250.11
        name: 192.168.250.11
        protocol: vnc
        port: 5901
        password: password

# Allow guacd.service to install and manage itself
guacd_config:
  install: true

# RDP settings
guacamole_rdp_color_depth: 24
guacamole_rdp_disable_auth: false
guacamole_rdp_height: 900
guacamole_rdp_width: 1440
guacamole_rdp_security: rdp
guacamole_rdp_ignore_cert: false
